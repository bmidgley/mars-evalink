# docker-compose for evalink on ZimaOS (or any Docker host).
#
# ZimaOS/CasaOS requires long-form port mappings (target/published/protocol)
# and an x-casaos block; short forms like "0.0.0.0:1883:1883" show Host=0
# and Container=NaN in the import UI.
#
# Topology:
#   - db        Postgres, on the internal compose network only (no host port).
#   - mqtt      Mosquitto, exposed on the host so Cloudflare Spectrum can
#               front it with TLS on the public side and forward plain MQTT
#               (port 1883) to this broker.
#   - web       Django + Gunicorn, exposed on the host so Cloudflare can
#               proxy HTTPS to it on plain HTTP.
#
# Copy .env.docker.example to .env and edit before installing.
# On ZimaOS, place the repo under /DATA/AppData/evalink so bind mounts resolve.

name: evalink

services:
  db:
    image: postgres:16-alpine
    container_name: evalink-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evalink}
      POSTGRES_USER: ${POSTGRES_USER:-evalink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - type: volume
        source: db_data
        target: /var/lib/postgresql/data
    networks:
      - evalink
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "${POSTGRES_USER:-evalink}" -d "${POSTGRES_DB:-evalink}"
      interval: 10s
      timeout: 5s
      retries: 10

  mqtt:
    image: eclipse-mosquitto:2
    container_name: evalink-mqtt
    restart: unless-stopped
    environment:
      MQTT_USER: ${MQTT_USER:?MQTT_USER must be set}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD must be set}
    ports:
      - target: 1883
        host_ip: ${MQTT_BIND_ADDR:-0.0.0.0}
        published: "${MQTT_HOST_PORT:-1883}"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/evalink/mosquitto/config
        target: /mosquitto/config
        read_only: true
      - type: bind
        source: /DATA/AppData/evalink/mosquitto/entrypoint.sh
        target: /usr/local/bin/mosquitto-entrypoint.sh
        read_only: true
      - type: volume
        source: mqtt_data
        target: /mosquitto/data
      - type: volume
        source: mqtt_log
        target: /mosquitto/log
    entrypoint: ["/usr/local/bin/mosquitto-entrypoint.sh"]
    command: ["mosquitto", "-c", "/mosquitto/config/mosquitto.conf"]
    networks:
      - evalink
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -u \"$$MQTT_USER\" -P \"$$MQTT_PASSWORD\" -t '$$SYS/broker/uptime' -C 1 -W 3 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    x-casaos:
      ports:
        - container: "1883"
          description:
            en_us: Plain MQTT (Cloudflare Spectrum terminates TLS on 8883)

  web:
    # ZimaOS cannot import custom build contexts; use the official Python image
    # and bind-mount the repo. docker-entrypoint.sh pip-installs on first boot.
    image: python:3.12-slim-bookworm
    container_name: evalink-web
    restart: unless-stopped
    working_dir: /app/evalink
    entrypoint: ["/bin/sh", "/app/docker-entrypoint.sh"]
    command: ["gunicorn"]
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      DJANGO_SETTINGS_MODULE: evalink.settings
      HOST: db
      PORT: 5432
      NAME: ${POSTGRES_DB:-evalink}
      DBUSER: ${POSTGRES_USER:-evalink}
      PASSWORD: ${POSTGRES_PASSWORD}
      SSLMODE: disable

      MQTT_SERVER: mqtt
      MQTT_PORT: 1883
      MQTT_KEEPALIVE: ${MQTT_KEEPALIVE:-60}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TLS: ""
      MQTT_TOPIC: ${MQTT_TOPIC:-msh/Development}
      MQTT_NODE_NUMBER: ${MQTT_NODE_NUMBER:-}

      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_BEHIND_PROXY: ${DJANGO_BEHIND_PROXY:-1}

      STATIC_ROOT: /app/static
      MEDIA_ROOT: /app/media

      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      RUN_COLLECTSTATIC: ${RUN_COLLECTSTATIC:-1}

      WEB_PORT: 8000
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}

      CAMPUS: ${CAMPUS:-MDRS}
      APRS_CALLSIGN: ${APRS_CALLSIGN:-}
      APRS_PASSCODE: ${APRS_PASSCODE:-}
      APRS_FI_API_KEY: ${APRS_FI_API_KEY:-}
    volumes:
      - type: bind
        source: /DATA/AppData/evalink
        target: /app
      - type: volume
        source: web_static
        target: /app/static
      - type: volume
        source: web_media
        target: /app/media
    ports:
      - target: 8000
        host_ip: ${WEB_BIND_ADDR:-127.0.0.1}
        published: "${WEB_HOST_PORT:-18000}"
        protocol: tcp
    networks:
      - evalink
    x-casaos:
      ports:
        - container: "8000"
          description:
            en_us: Django web UI (plain HTTP; Cloudflare proxies HTTPS)

networks:
  evalink:
    driver: bridge

volumes:
  db_data:
  mqtt_data:
  mqtt_log:
  web_static:
  web_media:

x-casaos:
  architectures:
    - amd64
    - arm64
  main: web
  author: self
  category: self
  hostname: ""
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/PostgreSQL/icon.png
  index: /
  is_uncontrolled: false
  port_map: "${WEB_HOST_PORT:-18000}"
  scheme: http
  store_app_id: evalink
  title:
    custom: evalink
    en_us: evalink
  tips:
    before_install:
      en_us: |
        Copy the repo to `/DATA/AppData/evalink` before installing (rsync or git clone).
        Create `/DATA/AppData/evalink/.env` from `.env.docker.example` and set
        POSTGRES_PASSWORD, MQTT_USER/MQTT_PASSWORD, and DJANGO_SECRET_KEY.
        First web container start installs Python packages (may take a few minutes).
        After install: `docker compose exec web python manage.py createsuperuser`
